<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface-variant": "#4c4546",
                        "secondary-container": "#e1dfdf",
                        "error": "#ba1a1a",
                        "surface-container-highest": "#e2e2e2",
                        "on-secondary-fixed": "#1b1c1c",
                        "tertiary": "#000000",
                        "surface-container-low": "#f4f3f3",
                        "on-primary": "#ffffff",
                        "tertiary-fixed-dim": "#c6c6c6",
                        "surface-container-lowest": "#ffffff",
                        "on-background": "#1a1c1c",
                        "on-primary-fixed": "#1b1b1b",
                        "on-tertiary-fixed-variant": "#474747",
                        "outline-variant": "#cfc4c5",
                        "on-error": "#ffffff",
                        "surface-bright": "#f9f9f9",
                        "error-container": "#ffdad6",
                        "surface-variant": "#e2e2e2",
                        "background": "#f9f9f9",
                        "on-error-container": "#93000a",
                        "secondary-fixed-dim": "#c7c6c6",
                        "on-primary-fixed-variant": "#474747",
                        "surface-dim": "#dadada",
                        "on-primary-container": "#848484",
                        "inverse-primary": "#c6c6c6",
                        "tertiary-container": "#1b1b1b",
                        "primary": "#000000",
                        "on-secondary-fixed-variant": "#464747",
                        "surface-container-high": "#e8e8e8",
                        "surface-container": "#eeeeee",
                        "surface": "#f9f9f9",
                        "on-secondary-container": "#626262",
                        "tertiary-fixed": "#e2e2e2",
                        "secondary": "#5e5e5e",
                        "on-surface": "#1a1c1c",
                        "primary-container": "#1b1b1b",
                        "on-tertiary": "#ffffff",
                        "inverse-surface": "#2f3131",
                        "on-tertiary-fixed": "#1b1b1b",
                        "secondary-fixed": "#e4e2e2",
                        "outline": "#7e7576",
                        "inverse-on-surface": "#f1f1f1",
                        "primary-fixed-dim": "#c6c6c6",
                        "on-secondary": "#ffffff",
                        "surface-tint": "#5e5e5e",
                        "on-tertiary-container": "#848484",
                        "primary-fixed": "#e2e2e2"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "max_width": "375px",
                        "margin": "24px",
                        "gutter": "16px",
                        "columns": "4",
                        "unit": "8px"
                    },
                    "fontFamily": {
                        "label": ["Inter"],
                        "title": ["Inter"],
                        "body": ["Inter"]
                    },
                    "fontSize": {
                        "label": ["14px", {"lineHeight": "20px", "fontWeight": "500"}],
                        "title": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "body": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: #f9f9f9;
            color: #1a1c1c;
            font-family: 'Inter', sans-serif;
            width: 375px;
            height: 812px;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            border: 1px solid #e2e2e2;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface">
<!-- TopAppBar -->
<header class="fixed top-0 w-full bg-surface dark:bg-surface border-b border-outline-variant flex items-center justify-between px-margin h-14 w-full z-50">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary active:opacity-70 cursor-pointer">arrow_back</span>
<h1 class="font-title text-title text-primary">PatchUp</h1>
</div>
<div>
<!-- Right-aligned slot for potential icons/actions -->
</div>
</header>
<!-- Main Content -->
<main class="pt-20 px-margin h-full flex flex-col">
<!-- Progress Indicator (Lo-Fi) -->
<div class="flex gap-2 mb-8">
<div class="h-1 flex-1 bg-primary"></div>
<div class="h-1 flex-1 bg-surface-container-highest"></div>
<div class="h-1 flex-1 bg-surface-container-highest"></div>
</div>
<section class="flex flex-col gap-6">
<h2 class="font-title text-title">Message Details</h2>
<!-- Message Field (Error State) -->
<div class="flex flex-col gap-2">
<label class="font-label text-label text-secondary">Message</label>
<textarea class="w-full min-h-[120px] p-4 border-2 border-primary rounded-lg bg-white font-body text-body focus:outline-none" placeholder="Enter your message..."></textarea>
<span class="text-[14px] text-secondary font-label">This field is required</span>
</div>
<!-- Time Selection Field (Error State) -->
<div class="flex flex-col gap-2">
<label class="font-label text-label text-secondary">Preferred Time</label>
<div class="relative">
<input class="w-full p-4 border-2 border-primary rounded-lg bg-white font-body text-body focus:outline-none" type="text" value="25:00"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-secondary">schedule</span>
</div>
<span class="text-[14px] text-secondary font-label">Enter a valid time</span>
</div>
<!-- Additional Lo-Fi Placeholder Info -->
<div class="p-4 bg-surface-container-low rounded-lg border border-outline-variant">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-secondary">info</span>
<p class="font-label text-label text-secondary leading-tight">Please ensure all required fields are filled correctly before proceeding to the next step.</p>
</div>
</div>
</section>
<!-- Bottom Action -->
<div class="mt-auto pb-8">
<button class="w-full bg-primary text-on-primary font-label text-label py-4 rounded-lg active:scale-95 transition-transform">
                Next
            </button>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 w-full z-50 bg-surface dark:bg-surface border-t border-outline-variant flex justify-around items-center h-16 px-margin w-full">
<div class="flex flex-col items-center justify-center text-primary font-bold hover:bg-surface-container-low active:scale-95 transition-transform cursor-pointer">
<span class="material-symbols-outlined">home</span>
<span class="font-label text-label">Home</span>
</div>
<div class="flex flex-col items-center justify-center text-secondary hover:bg-surface-container-low active:scale-95 transition-transform cursor-pointer">
<span class="material-symbols-outlined">history</span>
<span class="font-label text-label">History</span>
</div>
<div class="flex flex-col items-center justify-center text-secondary hover:bg-surface-container-low active:scale-95 transition-transform cursor-pointer">
<span class="material-symbols-outlined">person</span>
<span class="font-label text-label">Profile</span>
</div>
</nav>
<!-- Micro-interaction for feedback -->
<script>
        document.querySelector('button').addEventListener('click', function() {
            // Shake effect on error elements
            const errors = document.querySelectorAll('.border-primary');
            errors.forEach(el => {
                el.classList.add('translate-x-1');
                setTimeout(() => el.classList.remove('translate-x-1'), 100);
            });
        });
    </script>
</body></html>
