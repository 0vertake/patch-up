<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9f9f9;
        }
        .photo-placeholder-hatch {
            background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, #e2e2e2 10px, #e2e2e2 11px);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface-variant": "#4c4546",
                        "secondary-container": "#e1dfdf",
                        "error": "#ba1a1a",
                        "surface-container-highest": "#e2e2e2",
                        "on-secondary-fixed": "#1b1c1c",
                        "tertiary": "#000000",
                        "surface-container-low": "#f4f3f3",
                        "on-primary": "#ffffff",
                        "tertiary-fixed-dim": "#c6c6c6",
                        "surface-container-lowest": "#ffffff",
                        "on-background": "#1a1c1c",
                        "on-primary-fixed": "#1b1b1b",
                        "on-tertiary-fixed-variant": "#474747",
                        "outline-variant": "#cfc4c5",
                        "on-error": "#ffffff",
                        "surface-bright": "#f9f9f9",
                        "error-container": "#ffdad6",
                        "surface-variant": "#e2e2e2",
                        "background": "#f9f9f9",
                        "on-error-container": "#93000a",
                        "secondary-fixed-dim": "#c7c6c6",
                        "on-primary-fixed-variant": "#474747",
                        "surface-dim": "#dadada",
                        "on-primary-container": "#848484",
                        "inverse-primary": "#c6c6c6",
                        "tertiary-container": "#1b1b1b",
                        "primary": "#000000",
                        "on-secondary-fixed-variant": "#464747",
                        "surface-container-high": "#e8e8e8",
                        "surface-container": "#eeeeee",
                        "surface": "#f9f9f9",
                        "on-secondary-container": "#626262",
                        "tertiary-fixed": "#e2e2e2",
                        "secondary": "#5e5e5e",
                        "on-surface": "#1a1c1c",
                        "primary-container": "#1b1b1b",
                        "on-tertiary": "#ffffff",
                        "inverse-surface": "#2f3131",
                        "on-tertiary-fixed": "#1b1b1b",
                        "secondary-fixed": "#e4e2e2",
                        "outline": "#7e7576",
                        "inverse-on-surface": "#f1f1f1",
                        "primary-fixed-dim": "#c6c6c6",
                        "on-secondary": "#ffffff",
                        "surface-tint": "#5e5e5e",
                        "on-tertiary-container": "#848484",
                        "primary-fixed": "#e2e2e2"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "max_width": "375px",
                        "margin": "24px",
                        "gutter": "16px",
                        "columns": "4",
                        "unit": "8px"
                    },
                    "fontFamily": {
                        "label": ["Inter"],
                        "title": ["Inter"],
                        "body": ["Inter"]
                    },
                    "fontSize": {
                        "label": ["14px", {"lineHeight": "20px", "fontWeight": "500"}],
                        "title": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "body": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface flex flex-col items-center min-h-screen">
<!-- Main Canvas (375px Mobile Viewport) -->
<main class="w-[375px] h-[812px] bg-white relative flex flex-col overflow-hidden">
<!-- Top App Bar (Modified to fit specific S-40 requirements) -->
<header class="fixed top-0 w-[375px] z-50 bg-surface flex items-center justify-between px-margin h-14 border-b border-outline-variant">
<div class="flex items-center gap-2">
<span class="font-label text-label text-secondary">ID S-40</span>
</div>
<div class="absolute left-1/2 -translate-x-1/2">
<h1 class="font-title text-title text-primary">PatchUp</h1>
</div>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- Content Area -->
<div class="mt-14 px-margin pt-unit flex flex-col flex-1 pb-margin">
<!-- Scan Item ID Label -->
<div class="mt-4 mb-4">
<span class="font-label text-label text-secondary uppercase tracking-wider">Scan item</span>
</div>
<!-- Large Photo Placeholder Area -->
<div class="w-full flex-1 min-h-[300px] border border-outline bg-surface-container-lowest rounded-lg flex flex-col items-center justify-center relative overflow-hidden">
<!-- Cross-hatch Background Pattern -->
<div class="absolute inset-0 photo-placeholder-hatch opacity-40"></div>
<div class="relative z-10 flex flex-col items-center gap-4">
<div class="w-16 h-16 border border-outline rounded-full flex items-center justify-center bg-white">
<span class="material-symbols-outlined text-outline" data-icon="image">image</span>
</div>
<p class="font-body text-body text-secondary">Photo Placeholder</p>
</div>
</div>
<!-- Interaction Section -->
<div class="mt-margin space-y-4">
<!-- Primary Action 1: Take Photo -->
<button class="w-full h-14 bg-primary text-on-primary font-label text-label rounded-lg active:opacity-70 flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="photo_camera">photo_camera</span>
                    Take photo
                </button>
<!-- Primary Action 2: Upload Photo -->
<button class="w-full h-14 bg-primary text-on-primary font-label text-label rounded-lg active:opacity-70 flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="upload">upload</span>
                    Upload photo
                </button>
<!-- Secondary Action: Cancel -->
<button class="w-full h-14 border border-outline bg-transparent text-primary font-label text-label rounded-lg active:bg-surface-container-low transition-colors">
                    Cancel
                </button>
</div>
</div>
<!-- Footer / Success Overlay (Hidden by default, used for interaction demo) -->
<div class="hidden fixed bottom-margin left-margin right-margin bg-inverse-surface text-inverse-on-surface p-4 rounded-lg flex items-center justify-between animate-bounce" id="toast">
<span class="font-label text-label">Processing image...</span>
<span class="material-symbols-outlined" data-icon="hourglass_empty">hourglass_empty</span>
</div>
</main>
<!-- Micro-interaction Script -->
<script>
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', function() {
                const toast = document.getElementById('toast');
                if (this.innerText.includes('photo')) {
                    toast.classList.remove('hidden');
                    setTimeout(() => {
                        toast.classList.add('hidden');
                    }, 2000);
                }
            });
        });
    </script>
</body></html>
