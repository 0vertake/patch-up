<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface-variant": "#4c4546",
                        "secondary-container": "#e1dfdf",
                        "error": "#ba1a1a",
                        "surface-container-highest": "#e2e2e2",

                        "surface-container-low": "#f4f3f3",
                        "on-primary": "#ffffff",
                        "tertiary-fixed-dim": "#c6c6c6",
                        "surface-container-lowest": "#ffffff",
                        "on-background": "#1a1c1c",
                        "on-primary-fixed": "#1b1b1b",
                        "on-tertiary-fixed-variant": "#474747",
                        "outline-variant": "#cfc4c5",
                        "on-error": "#ffffff",
                        "surface-bright": "#f9f9f9",
                        "error-container": "#ffdad6",
                        "surface-variant": "#e2e2e2",
                        "background": "#f9f9f9",
                        "on-error-container": "#93000a",
                        "secondary-fixed-dim": "#c7c6c6",
                        "on-primary-fixed-variant": "#474747",
                        "surface-dim": "#dadada",
                        "on-primary-container": "#848484",
                        "inverse-primary": "#c6c6c6",
                        "tertiary-container": "#1b1b1b",
                        "primary": "#000000",
                        "on-secondary-fixed-variant": "#464747",
                        "surface-container-high": "#e8e8e8",
                        "surface-container": "#eeeeee",
                        "surface": "#f9f9f9",
                        "on-surface": "#1a1c1c",
                        "primary-container": "#1b1b1b",
                        "on-tertiary": "#ffffff",
                        "inverse-surface": "#2f3131",
                        "on-tertiary-fixed": "#1b1b1b",
                        "secondary-fixed": "#e4e2e2",
                        "outline": "#7e7576",
                        "inverse-on-surface": "#f1f1f1",
                        "primary-fixed-dim": "#c6c6c6",
                        "on-secondary": "#ffffff",
                        "surface-tint": "#5e5e5e",
                        "on-tertiary-container": "#848484",
                        "primary-fixed": "#e2e2e2"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "max_width": "375px",
                        "margin": "24px",
                        "gutter": "16px",
                        "columns": "4",
                        "unit": "8px"
                    },
                    "fontFamily": {
                        "label": ["Inter"],
                        "title": ["Inter"],
                        "body": ["Inter"]
                    },
                    "fontSize": {
                        "label": ["14px", {"lineHeight": "20px", "fontWeight": "500"}],
                        "title": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "body": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
        body {
            background-color: #f9f9f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }
        .app-container {
            width: 375px;
            height: 812px;
            background: #ffffff;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        input:focus {
            outline: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body>
<div class="app-container">
<!-- TopAppBar (Suppressed for focused transactional screen, but following structure for header) -->
<header class="fixed top-0 w-375 px-margin h-14 w-full flex items-center justify-between border-b border-outline-variant bg-surface">
<button class="active:opacity-70">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="font-title text-title text-primary font-bold">PatchUp</h1>
<div class="w-6"></div> <!-- Spacer for center alignment -->
</header>
<main class="mt-14 flex-1 px-margin py-8 flex flex-col">
<!-- Progress Indicator (Atmospheric Lo-Fi) -->
<div class="flex gap-2 mb-8">
<div class="h-1 flex-1 bg-primary"></div>
<div class="h-1 flex-1 bg-surface-container-highest"></div>
<div class="h-1 flex-1 bg-surface-container-highest"></div>
</div>
<!-- Content Header -->
<div class="mb-8">
<h2 class="font-title text-title text-on-background mb-2">Create your account</h2>
<p class="font-body text-label text-secondary">Step 1: Basic Information</p>
</div>
<!-- Form Section -->
<div class="space-y-6">
<!-- Input 1: Full Name -->
<div class="flex flex-col gap-2">
<label class="font-label text-label text-on-surface">Full Name</label>
<!-- Error State: 2px Black border (thickened as per instructions) -->
<input class="h-12 w-full px-4 border-2 border-primary rounded-lg bg-white font-body text-body" placeholder="e.g. Alex Rivera" type="text"/>
<span class="font-label text-[14px] text-secondary">This field is required</span>
</div>
<!-- Input 2: Email Address -->
<div class="flex flex-col gap-2">
<label class="font-label text-label text-on-surface">Email Address</label>
<!-- Error State: 2px Black border -->
<input class="h-12 w-full px-4 border-2 border-primary rounded-lg bg-white font-body text-body" placeholder="email@example.com" type="email"/>
<span class="font-label text-[14px] text-secondary">This field is required</span>
</div>
</div>
<!-- Action Area (Bottom Fixed-like feel) -->
<div class="mt-auto pt-8">
<button class="w-full h-12 bg-primary text-on-primary font-label text-label rounded-lg active:scale-[0.98] transition-transform">
                    Next
                </button>
<button class="w-full h-12 mt-2 border border-outline text-primary font-label text-label rounded-lg active:opacity-70">
                    Cancel
                </button>
</div>
</main>
<!-- Image Placeholder (Lo-Fi Contextual) -->
<div class="px-margin mb-24">
<div class="aspect-video border border-outline-variant rounded-lg flex items-center justify-center bg-surface-container-low overflow-hidden">
<div class="text-center p-4">
<span class="material-symbols-outlined text-secondary text-4xl block mb-2">image</span>
<p class="font-label text-[12px] text-secondary">Account Security Visual</p>
</div>
<img class="hidden" data-alt="A minimalist technical diagram in black and white illustrating secure user authentication flows. The composition is clean and architectural, utilizing thin lines and geometric shapes to represent data protection. The background is a crisp off-white, reflecting a professional and high-fidelity low-fidelity design system aesthetic. Soft, diffuse lighting highlights the simplicity and structural logic of the interface components." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBZcj7pj2g_yf-kW5kpXwR7aX4hqNkk_8FHZ4sqXNG0SD2KL1VySoB4RszG50YU_q9qWE4IZv03EmJSY2z53mGePocRNyv__0XVptz0yDX_mT7dLOV83hKQfu2dU9Mr-SY3DH2s6HGZs_Tyi9diyMuWX4kbUb8myCejUwypjzTPkfknquyVYpmL6mgJf0C6jFAH5-os3lTvfsve9jHzciJ53lMCTvE7q1ubFfL1iy1mSuicjUNV86p8G579LRwx8JNwyBz4aqmSM30p"/>
</div>
</div>
<!-- Navigation Shell (Suppressed based on Transactional Rule: Login/Onboarding) -->
</div>
<script>
        // Micro-interaction for the "Next" button click to simulate error vibration or state reset
        document.querySelector('button.bg-primary').addEventListener('click', function() {
            this.classList.add('animate-pulse');
            setTimeout(() => {
                this.classList.remove('animate-pulse');
            }, 500);
        });

        // Simple focus interaction to highlight fields when user tries to correct them
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.classList.replace('border-primary', 'border-on-surface-variant');
            });
            input.addEventListener('blur', () => {
                if(input.value === '') {
                    input.classList.replace('border-on-surface-variant', 'border-primary');
                }
            });
        });
    </script>
</body></html>
