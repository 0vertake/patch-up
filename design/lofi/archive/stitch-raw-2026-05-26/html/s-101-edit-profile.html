<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "on-background": "#1a1c1c",

                        "on-tertiary-fixed-variant": "#474747",
                        "outline-variant": "#cfc4c5",
                        "on-error": "#ffffff",
                        "surface-bright": "#f9f9f9",
                        "error-container": "#ffdad6",
                        "surface-variant": "#e2e2e2",
                        "background": "#f9f9f9",
                        "on-error-container": "#93000a",
                        "secondary-fixed-dim": "#c7c6c6",
                        "on-primary-fixed-variant": "#474747",
                        "surface-dim": "#dadada",
                        "on-primary-container": "#848484",
                        "inverse-primary": "#c6c6c6",
                        "tertiary-container": "#1b1b1b",
                        "primary": "#000000",
                        "on-secondary-fixed-variant": "#464747",
                        "surface-container-high": "#e8e8e8",
                        "surface-container": "#eeeeee",
                        "surface": "#f9f9f9",
                        "on-secondary-container": "#626262",
                        "tertiary-fixed": "#e2e2e2",
                        "secondary": "#5e5e5e",
                        "on-surface": "#1a1c1c",
                        "primary-container": "#1b1b1b",
                        "on-tertiary": "#ffffff",
                        "inverse-surface": "#2f3131",
                        "on-tertiary-fixed": "#1b1b1b",
                        "secondary-fixed": "#e4e2e2",
                        "outline": "#7e7576",
                        "inverse-on-surface": "#f1f1f1",
                        "primary-fixed-dim": "#c6c6c6",
                        "on-secondary": "#ffffff",
                        "surface-tint": "#5e5e5e",
                        "on-tertiary-container": "#848484",

                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "8px",
                        "xl": "0.75rem",

                    },
                    "spacing": {
                        "max_width": "375px",
                        "margin": "24px",
                        "gutter": "16px",
                        "columns": "4",
                        "unit": "8px"
                    },
                    "fontFamily": {
                        "label": ["Inter"],
                        "title": ["Inter"],
                        "body": ["Inter"]
                    },
                    "fontSize": {
                        "label": ["14px", {"lineHeight": "20px", "fontWeight": "500"}],
                        "title": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "body": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]

            },

<style>
        body {
            background-color: #f9f9f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }
        .canvas {
            width: 375px;
            height: 812px;
            background: #ffffff;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body>
<div class="canvas hide-scrollbar">
<!-- Top Navigation Bar -->
<header class="fixed top-0 w-full bg-surface z-10 flex items-center justify-between px-margin h-14 border-b border-outline-variant">
<div class="flex items-center gap-4">
<button class="active:opacity-70">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="font-title text-title text-primary">Edit Profile</h1>
</div>
<span class="text-[10px] font-mono text-secondary">S-101</span>
</header>
<!-- Main Content Area -->
<main class="mt-14 px-margin pt-8 flex-grow">
<!-- Profile Picture Section (Simplified for Lo-Fi) -->
<div class="flex flex-col items-center mb-10">
<div class="w-24 h-24 rounded-full border border-outline-variant bg-surface-container flex items-center justify-center mb-4 overflow-hidden">
<img alt="Profile Placeholder" class="w-full h-full object-cover grayscale" data-alt="A minimalist, high-contrast studio portrait of a person with neutral expression, rendered in a grayscale palette. The lighting is soft and flat, emphasizing the clean architectural lines of the face against a stark white background. The image follows a strict lo-fi aesthetic, avoiding any vibrant colors or complex textures to maintain a professional and analytical visual tone consistent with a wireframe design system." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAXFj6bVmOL8X5lf-DB1M2I52xNkDAh4jo2s696FBbe3edsr75JCbvn0rL3GhR5Xv9RIpmFU18i1ecQlGqUjjVIyo-CZ3pzAkItFS3zgwP6ugndCAIqDnWTAJE_uEQkgVR085qsM7fDwxPAYEUAl8ermJX2wREmxlay8kmV6KMLWiUF_5mIfMEC7wxkqfdLP3oAlPt6oYH2WBUqZoniEJ5M-1Kfh9H0z8Ft2caozG7N9oZbs0DJolmpCxW1GJmX6A2K_JujqoOAVKB7"/>
</div>
<button class="font-label text-label text-primary border-b border-primary">Change Photo</button>
</div>
<!-- Form Fields -->
<form class="flex flex-col gap-6" id="profileForm">
<div class="flex flex-col gap-2">
<label class="font-label text-label text-on-surface-variant" for="name">Name</label>
<input class="w-full h-12 px-4 border border-outline rounded-lg font-body text-body focus:outline-none focus:border-primary transition-colors bg-white" id="name" name="name" type="text" value="Alex Johnson"/>
</div>
<div class="flex flex-col gap-2">
<label class="font-label text-label text-on-surface-variant" for="email">Email</label>
<input class="w-full h-12 px-4 border border-outline rounded-lg font-body text-body focus:outline-none focus:border-primary transition-colors bg-white" id="email" name="email" type="email" value="alex.j@example.com"/>
</div>
<div class="flex flex-col gap-2">
<label class="font-label text-label text-on-surface-variant" for="phone">Phone</label>
<input class="w-full h-12 px-4 border border-outline rounded-lg font-body text-body focus:outline-none focus:border-primary transition-colors bg-white" id="phone" name="phone" type="tel" value="+1 (555) 000-0000"/>
</div>
</form>
</main>
<!-- Fixed Footer Action -->
<footer class="p-margin bg-white border-t border-outline-variant">
<button class="w-full h-14 rounded-lg bg-primary text-on-primary font-title text-title flex items-center justify-center transition-all disabled:bg-surface-container-highest disabled:text-secondary cursor-not-allowed" disabled="" id="saveButton">
                Save
            </button>
</footer>
</div>
<script>
        const form = document.getElementById('profileForm');
        const saveButton = document.getElementById('saveButton');
        const inputs = form.querySelectorAll('input');
        
        // Initial values store
        const initialValues = {
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value
        };

        const checkChanges = () => {
            let hasChanged = false;
            inputs.forEach(input => {
                if (input.value !== initialValues[input.id]) {
                    hasChanged = true;
                }
            });

            if (hasChanged) {
                saveButton.disabled = false;
                saveButton.classList.remove('cursor-not-allowed');
                saveButton.classList.add('active:scale-95');
            } else {
                saveButton.disabled = true;
                saveButton.classList.add('cursor-not-allowed');
                saveButton.classList.remove('active:scale-95');
            }
        };

        inputs.forEach(input => {
            input.addEventListener('input', checkChanges);
        });

        saveButton.addEventListener('click', () => {
            if (!saveButton.disabled) {
                alert('Profile changes saved successfully.');
                // Update initials to "commit" changes for this session
                inputs.forEach(input => {
                    initialValues[input.id] = input.value;
                });
                checkChanges();
            }
        });
    </script>
</body></html>
