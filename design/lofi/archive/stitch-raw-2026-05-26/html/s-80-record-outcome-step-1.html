<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    body {
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .radio-custom:checked + div {
      background-color: #000000;
    }
  </style>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
                  "on-surface-variant": "#4c4546",
                  "secondary-container": "#e1dfdf",
                  "error": "#ba1a1a",
                  "surface-container-highest": "#e2e2e2",
                  "on-secondary-fixed": "#1b1c1c",
                  "tertiary": "#000000",
                  "surface-container-low": "#f4f3f3",
                  "on-primary": "#ffffff",
                  "tertiary-fixed-dim": "#c6c6c6",
                  "surface-container-lowest": "#ffffff",
                  "on-background": "#1a1c1c",
                  "on-primary-fixed": "#1b1b1b",
                  "on-tertiary-fixed-variant": "#474747",
                  "outline-variant": "#cfc4c5",
                  "on-error": "#ffffff",
                  "surface-bright": "#f9f9f9",
                  "error-container": "#ffdad6",
                  "surface-variant": "#e2e2e2",
                  "background": "#f9f9f9",
                  "on-error-container": "#93000a",
                  "secondary-fixed-dim": "#c7c6c6",
                  "on-primary-fixed-variant": "#474747",
                  "surface-dim": "#dadada",
                  "on-primary-container": "#848484",
                  "inverse-primary": "#c6c6c6",
                  "tertiary-container": "#1b1b1b",
                  "primary": "#000000",
                  "on-secondary-fixed-variant": "#464747",
                  "surface-container-high": "#e8e8e8",
                  "surface-container": "#eeeeee",
                  "surface": "#f9f9f9",
                  "on-secondary-container": "#626262",
                  "tertiary-fixed": "#e2e2e2",
                  "secondary": "#5e5e5e",
                  "on-surface": "#1a1c1c",
                  "primary-container": "#1b1b1b",
                  "on-tertiary": "#ffffff",
                  "inverse-surface": "#2f3131",
                  "on-tertiary-fixed": "#1b1b1b",
                  "secondary-fixed": "#e4e2e2",
                  "outline": "#7e7576",
                  "inverse-on-surface": "#f1f1f1",
                  "primary-fixed-dim": "#c6c6c6",
                  "on-secondary": "#ffffff",
                  "surface-tint": "#5e5e5e",
                  "on-tertiary-container": "#848484",
                  "primary-fixed": "#e2e2e2"
          },
          "borderRadius": {
                  "DEFAULT": "8px",
                  "lg": "12px",
                  "xl": "16px",
                  "full": "9999px"
          },
          "spacing": {
                  "max_width": "375px",
                  "margin": "24px",
                  "gutter": "16px",
                  "columns": "4",
                  "unit": "8px"
          },
          "fontFamily": {
                  "label": ["Inter"],
                  "title": ["Inter"],
                  "body": ["Inter"]
          },
          "fontSize": {
                  "label": ["14px", {"lineHeight": "20px", "fontWeight": "500"}],
                  "title": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                  "body": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
          }
        },
      },
    }
  </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex justify-center">
<main class="w-full max-w-[375px] min-h-[812px] bg-white relative flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full max-w-[375px] bg-surface flex items-center justify-between px-margin h-14 border-b border-outline-variant z-10">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary cursor-pointer active:opacity-70" data-icon="arrow_back">arrow_back</span>
<span class="font-title text-title text-primary">PatchUp</span>
</div>
<div class="font-label text-label text-secondary">S-80</div>
</header>
<div class="mt-14 px-margin pt-8 flex flex-col flex-grow">
<!-- Stepper & ID -->
<div class="flex flex-col gap-1 mb-6">
<span class="font-label text-label text-secondary">Step 1 of 2</span>
<h1 class="font-title text-title text-primary">Record Outcome</h1>
</div>
<!-- Selection List -->
<form class="flex flex-col gap-4" id="outcome-form">
<label class="group flex items-center justify-between p-4 border border-outline-variant rounded-DEFAULT cursor-pointer hover:bg-surface-container-low transition-colors" onclick="selectOption(this)">
<span class="font-body text-body text-on-surface">Fixed</span>
<div class="relative flex items-center justify-center">
<input class="radio-custom sr-only peer" name="outcome" onchange="validateSelection()" type="radio" value="fixed"/>
<div class="w-5 h-5 border border-outline rounded-full flex items-center justify-center peer-checked:border-primary">
<div class="w-2.5 h-2.5 rounded-full bg-transparent peer-checked:bg-primary"></div>
</div>
</div>
</label>
<label class="group flex items-center justify-between p-4 border border-outline-variant rounded-DEFAULT cursor-pointer hover:bg-surface-container-low transition-colors" onclick="selectOption(this)">
<span class="font-body text-body text-on-surface">Partially fixed</span>
<div class="relative flex items-center justify-center">
<input class="radio-custom sr-only peer" name="outcome" onchange="validateSelection()" type="radio" value="partially_fixed"/>
<div class="w-5 h-5 border border-outline rounded-full flex items-center justify-center peer-checked:border-primary">
<div class="w-2.5 h-2.5 rounded-full bg-transparent"></div>
</div>
</div>
</label>
<label class="group flex items-center justify-between p-4 border border-outline-variant rounded-DEFAULT cursor-pointer hover:bg-surface-container-low transition-colors" onclick="selectOption(this)">
<span class="font-body text-body text-on-surface">Not fixed</span>
<div class="relative flex items-center justify-center">
<input class="radio-custom sr-only peer" name="outcome" onchange="validateSelection()" type="radio" value="not_fixed"/>
<div class="w-5 h-5 border border-outline rounded-full flex items-center justify-center peer-checked:border-primary">
<div class="w-2.5 h-2.5 rounded-full bg-transparent"></div>
</div>
</div>
</label>
</form>
<!-- Spacer for button position -->
<div class="flex-grow"></div>
<!-- Actions -->
<div class="py-8">
<button class="w-full h-12 bg-outline-variant text-secondary font-label text-label rounded-DEFAULT transition-all cursor-not-allowed" disabled="" id="next-button">
          Next
        </button>
</div>
</div>
<!-- Bottom Navigation Shell (Suppressed for transactional screen as per mandate) -->
</main>
<script>
    function validateSelection() {
      const radios = document.getElementsByName('outcome');
      const nextBtn = document.getElementById('next-button');
      let isChecked = false;

      for (const radio of radios) {
        if (radio.checked) {
          isChecked = true;
          // Visual update for the pseudo-radio center dot
          const parent = radio.closest('label');
          const dot = parent.querySelector('.rounded-full div');
          
          // Reset all dots first
          document.querySelectorAll('input[name="outcome"]').forEach(r => {
             r.closest('label').querySelector('.rounded-full div').classList.replace('bg-primary', 'bg-transparent');
          });
          
          dot.classList.replace('bg-transparent', 'bg-primary');
          break;
        }
      }

      if (isChecked) {
        nextBtn.disabled = false;
        nextBtn.classList.remove('bg-outline-variant', 'text-secondary', 'cursor-not-allowed');
        nextBtn.classList.add('bg-primary', 'text-on-primary', 'cursor-pointer', 'active:opacity-80');
      }
    }

    function selectOption(element) {
      const radio = element.querySelector('input[type="radio"]');
      radio.checked = true;
      validateSelection();
    }
  </script>
</body></html>
