<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=375, height=812, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            font-size: 24px;
        }
        body {
            font-family: 'Inter', sans-serif;
            width: 375px;
            height: 812px;
            margin: 0 auto;
            background-color: #f9f9f9;
            position: relative;
            overflow-x: hidden;
        }
        /* Custom scrollbar to maintain Lo-Fi aesthetic */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #f9f9f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #e0e0e0;
        }
    </style>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-surface-variant": "#4c4546",
                    "secondary-container": "#e1dfdf",
                    "error": "#ba1a1a",
                    "surface-container-highest": "#e2e2e2",
                    "on-secondary-fixed": "#1b1c1c",
                    "tertiary": "#000000",
                    "surface-container-low": "#f4f3f3",
                    "on-primary": "#ffffff",
                    "tertiary-fixed-dim": "#c6c6c6",
                    "surface-container-lowest": "#ffffff",
                    "on-background": "#1a1c1c",
                    "on-primary-fixed": "#1b1b1b",
                    "on-tertiary-fixed-variant": "#474747",
                    "outline-variant": "#cfc4c5",
                    "on-error": "#ffffff",
                    "surface-bright": "#f9f9f9",
                    "error-container": "#ffdad6",
                    "surface-variant": "#e2e2e2",
                    "background": "#f9f9f9",
                    "on-error-container": "#93000a",
                    "secondary-fixed-dim": "#c7c6c6",
                    "on-primary-fixed-variant": "#474747",
                    "surface-dim": "#dadada",
                    "on-primary-container": "#848484",
                    "inverse-primary": "#c6c6c6",
                    "tertiary-container": "#1b1b1b",
                    "primary": "#000000",
                    "on-secondary-fixed-variant": "#464747",
                    "surface-container-high": "#e8e8e8",
                    "surface-container": "#eeeeee",
                    "surface": "#f9f9f9",
                    "on-secondary-container": "#626262",
                    "tertiary-fixed": "#e2e2e2",
                    "secondary": "#5e5e5e",
                    "on-surface": "#1a1c1c",
                    "primary-container": "#1b1b1b",
                    "on-tertiary": "#ffffff",
                    "inverse-surface": "#2f3131",
                    "on-tertiary-fixed": "#1b1b1b",
                    "secondary-fixed": "#e4e2e2",
                    "outline": "#7e7576",
                    "inverse-on-surface": "#f1f1f1",
                    "primary-fixed-dim": "#c6c6c6",
                    "on-secondary": "#ffffff",
                    "surface-tint": "#5e5e5e",
                    "on-tertiary-container": "#848484",
                    "primary-fixed": "#e2e2e2"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "max_width": "375px",
                    "margin": "24px",
                    "gutter": "16px",
                    "columns": "4",
                    "unit": "8px"
            },
            "fontFamily": {
                    "label": ["Inter"],
                    "title": ["Inter"],
                    "body": ["Inter"]
            },
            "fontSize": {
                    "label": ["14px", {"lineHeight": "20px", "fontWeight": "500"}],
                    "title": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "body": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col">
<!-- Top AppBar -->
<header class="fixed top-0 w-full z-40 bg-surface border-b border-outline-variant flex items-center justify-between px-margin h-14">
<div class="flex items-center gap-4">
<button class="active:opacity-70 hover:bg-surface-container p-1 rounded-full">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="font-title text-title text-primary">Profile</h1>
</div>
<div class="text-[10px] font-mono text-secondary opacity-50">ID S-100</div>
</header>
<!-- Main Content -->
<main class="flex-1 mt-14 mb-16 overflow-y-auto px-margin pt-8 pb-12">
<!-- Profile Header Section -->
<section class="flex flex-col items-center mb-10">
<div class="w-24 h-24 rounded-full border border-outline bg-surface-container flex items-center justify-center mb-4 overflow-hidden">
<div class="w-full h-full border-2 border-dashed border-outline-variant rounded-full flex items-center justify-center bg-surface-container-low" data-alt="A minimalist grayscale profile avatar placeholder within a UI design. The visual style is strictly lo-fi and architectural, using a clean off-white background with a subtle dashed circular border. Soft, flat lighting emphasizes the structural logic of the interface, maintaining a professional and neutral atmosphere that avoids any photographic realism in favor of schematic representation.">
<span class="material-symbols-outlined text-outline text-4xl">person</span>
</div>
</div>
<h2 class="font-title text-title text-primary mb-1">User Name</h2>
<p class="font-label text-label text-secondary">user.email@example.com</p>
</section>
<!-- Settings List -->
<section class="space-y-unit">
<!-- Edit Profile -->
<button class="w-full flex items-center justify-between p-4 bg-white border border-outline-variant rounded-lg hover:bg-surface-container-low active:scale-[0.98] transition-transform">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary">edit</span>
<span class="font-body text-body text-primary">Edit Profile</span>
</div>
<span class="material-symbols-outlined text-secondary">chevron_right</span>
</button>
<!-- Notification Settings -->
<button class="w-full flex items-center justify-between p-4 bg-white border border-outline-variant rounded-lg hover:bg-surface-container-low active:scale-[0.98] transition-transform">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary">notifications</span>
<span class="font-body text-body text-primary">Notification Settings</span>
</div>
<span class="material-symbols-outlined text-secondary">chevron_right</span>
</button>
<!-- Divider with Spacing -->
<div class="py-4">
<div class="h-[1px] bg-outline-variant w-full"></div>
</div>
<!-- Sign Out -->
<button class="w-full flex items-center justify-between p-4 bg-white border border-outline-variant rounded-lg hover:bg-surface-container-low active:scale-[0.98] transition-transform">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-error">logout</span>
<span class="font-body text-body text-error">Sign Out</span>
</div>
</button>
</section>
<!-- Version Label -->
<div class="mt-12 text-center">
<span class="font-label text-label text-secondary opacity-40">v1.0.42</span>
</div>
</main>
<!-- Bottom NavBar -->
<nav class="fixed bottom-0 w-full z-50 bg-surface border-t border-outline-variant flex justify-around items-center h-16 px-margin">
<!-- Home Tab -->
<button class="flex flex-col items-center justify-center text-secondary hover:bg-surface-container-low active:scale-95 transition-transform px-4 h-full">
<span class="material-symbols-outlined">home</span>
<span class="font-label text-label">Home</span>
</button>
<!-- History Tab -->
<button class="flex flex-col items-center justify-center text-secondary hover:bg-surface-container-low active:scale-95 transition-transform px-4 h-full">
<span class="material-symbols-outlined">history</span>
<span class="font-label text-label">History</span>
</button>
<!-- Profile Tab (ACTIVE) -->
<button class="flex flex-col items-center justify-center text-primary font-bold hover:bg-surface-container-low active:scale-95 transition-transform px-4 h-full">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-label text-label">Profile</span>
</button>
</nav>
<script>
        // Simple micro-interaction for buttons
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('touchstart', function() {
                this.classList.add('opacity-70');
            });
            button.addEventListener('touchend', function() {
                this.classList.remove('opacity-70');
            });
        });
    </script>
</body></html>
