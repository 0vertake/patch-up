<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=375, height=812, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface-variant": "#4c4546",
                        "secondary-container": "#e1dfdf",
                        "error": "#ba1a1a",
                        "surface-container-highest": "#e2e2e2",
                        "on-secondary-fixed": "#1b1c1c",
                        "tertiary": "#000000",
                        "surface-container-low": "#f4f3f3",
                        "on-primary": "#ffffff",
                        "tertiary-fixed-dim": "#c6c6c6",
                        "surface-container-lowest": "#ffffff",
                        "on-background": "#1a1c1c",
                        "on-primary-fixed": "#1b1b1b",
                        "on-tertiary-fixed-variant": "#474747",
                        "outline-variant": "#cfc4c5",
                        "on-error": "#ffffff",
                        "surface-bright": "#f9f9f9",
                        "error-container": "#ffdad6",
                        "surface-variant": "#e2e2e2",
                        "background": "#f9f9f9",
                        "on-error-container": "#93000a",
                        "secondary-fixed-dim": "#c7c6c6",
                        "on-primary-fixed-variant": "#474747",
                        "surface-dim": "#dadada",
                        "on-primary-container": "#848484",
                        "inverse-primary": "#c6c6c6",
                        "tertiary-container": "#1b1b1b",
                        "primary": "#000000",
                        "on-secondary-fixed-variant": "#464747",
                        "surface-container-high": "#e8e8e8",
                        "surface-container": "#eeeeee",
                        "surface": "#f9f9f9",
                        "on-secondary-container": "#626262",
                        "tertiary-fixed": "#e2e2e2",
                        "secondary": "#5e5e5e",
                        "on-surface": "#1a1c1c",
                        "primary-container": "#1b1b1b",
                        "on-tertiary": "#ffffff",
                        "inverse-surface": "#2f3131",
                        "on-tertiary-fixed": "#1b1b1b",
                        "secondary-fixed": "#e4e2e2",
                        "outline": "#7e7576",
                        "inverse-on-surface": "#f1f1f1",
                        "primary-fixed-dim": "#c6c6c6",
                        "on-secondary": "#ffffff",
                        "surface-tint": "#5e5e5e",
                        "on-tertiary-container": "#848484",
                        "primary-fixed": "#e2e2e2"
                    },
                    "borderRadius": {
                        "DEFAULT": "8px",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "max_width": "375px",
                        "margin": "24px",
                        "gutter": "16px",
                        "columns": "4",
                        "unit": "8px"
                    },
                    "fontFamily": {
                        "label": ["Inter"],
                        "title": ["Inter"],
                        "body": ["Inter"]
                    },
                    "fontSize": {
                        "label": ["14px", {"lineHeight": "20px", "fontWeight": "500"}],
                        "title": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "body": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
        body {
            background-color: #f9f9f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .canvas {
            width: 375px;
            height: 812px;
            background-color: #ffffff;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface">
<main class="canvas shadow-2xl">
<!-- Top App Bar (Modified for Sign-In Flow per Suppression Rules) -->
<header class="fixed top-0 w-full flex items-center justify-between px-margin h-14 w-full bg-surface border-b border-outline-variant z-10">
<div class="flex items-center">
<span class="text-[12px] font-mono text-secondary mr-2">S-10</span>
<button class="active:opacity-70">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
</div>
<h1 class="font-title text-title text-primary absolute left-1/2 -translate-x-1/2">PatchUp</h1>
<div class="w-6"></div> <!-- Spacer for center alignment -->
</header>
<!-- Content Canvas -->
<div class="flex-1 px-margin pt-24 pb-margin flex flex-col">
<!-- Information Note -->
<div class="bg-surface-container-low p-4 rounded-DEFAULT mb-8 border border-outline-variant">
<p class="font-label text-label text-secondary text-center">All fields are required</p>
</div>
<!-- Page Title -->
<div class="mb-8">
<h2 class="font-title text-title text-primary">Sign in</h2>
</div>
<!-- Form -->
<form class="space-y-6 flex-1">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label text-label text-on-surface" for="email">Email</label>
<input class="w-full h-12 px-4 rounded-DEFAULT border border-outline bg-white font-body text-body focus:outline-none focus:border-primary placeholder:text-secondary-fixed-dim" id="email" placeholder="Enter your email" type="email"/>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="font-label text-label text-on-surface" for="password">Password</label>
<div class="relative">
<input class="w-full h-12 px-4 rounded-DEFAULT border border-outline bg-white font-body text-body focus:outline-none focus:border-primary placeholder:text-secondary-fixed-dim" id="password" placeholder="Enter your password" type="password"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-secondary cursor-pointer">visibility</span>
</div>
</div>
<!-- Forgot Password -->
<div class="flex justify-end">
<button class="font-label text-label text-secondary hover:text-primary active:opacity-70 transition-colors" type="button">
                        Forgot Password?
                    </button>
</div>
</form>
<!-- Bottom Action Area -->
<div class="mt-auto space-y-4">
<!-- Primary Action (Disabled) -->
<button class="w-full h-14 bg-[#E0E0E0] text-[#9E9E9E] font-label text-label rounded-DEFAULT flex items-center justify-center cursor-not-allowed" disabled="">
                    Sign in
                </button>
<!-- Secondary Action -->
<p class="font-body text-body text-secondary text-center">
                    Don't have an account? <span class="text-primary font-bold cursor-pointer">Sign up</span>
</p>
</div>
</div>
<!-- Decorative Asymmetric Element (Lo-Fi style) -->
<div class="absolute -bottom-16 -right-16 w-32 h-32 border border-outline-variant rounded-full opacity-20 pointer-events-none"></div>
</main>
<script>
        // Simple logic for toggle visibility (micro-interaction)
        const passwordInput = document.getElementById('password');
        const visibilityToggle = document.querySelector('.material-symbols-outlined.absolute');
        
        if (visibilityToggle && passwordInput) {
            visibilityToggle.addEventListener('click', () => {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                visibilityToggle.textContent = type === 'password' ? 'visibility' : 'visibility_off';
            });
        }
    </script>
</body></html>
