<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=375, height=812, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>

<script id="tailwind-config">

            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface-variant": "#4c4546",
                        "secondary-container": "#e1dfdf",
                        "error": "#ba1a1a",

                        "surface-container": "#eeeeee",
                        "surface": "#f9f9f9",
                        "on-surface": "#1a1c1c",
                        "primary-container": "#1b1b1b",
                        "on-tertiary": "#ffffff",
                        "inverse-surface": "#2f3131",
                        "on-tertiary-fixed": "#1b1b1b",

                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "max_width": "375px",
                        "margin": "24px",
                        "gutter": "16px",
                        "columns": "4",
                        "unit": "8px"
                    },
                    "fontFamily": {
                        "label": ["Inter"],
                        "title": ["Inter"],
                        "body": ["Inter"]
                    },
                    "fontSize": {
                        "label": ["14px", {"lineHeight": "20px", "fontWeight": "500"}],
                        "title": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body selection:bg-surface-container-highest flex justify-center min-h-screen">
<!-- Mobile Screen Wrapper (375x812 simulate) -->
<main class="w-[375px] h-[812px] bg-surface relative flex flex-col overflow-hidden">
<!-- TopAppBar (S-30 ID Overlay) -->
<header class="fixed top-0 w-[375px] z-50 bg-surface border-b border-outline-variant flex items-center justify-between px-margin h-14">
<div class="flex items-center gap-2">
<span class="font-label text-[10px] text-secondary tracking-widest uppercase">ID S-30</span>
<h1 class="font-title text-title text-primary">Home</h1>
</div>
<button class="hover:bg-surface-container active:opacity-70 rounded-full p-2">
<span class="material-symbols-outlined text-primary" data-icon="account_circle">account_circle</span>
</button>
</header>
<!-- Content Canvas -->
<section class="flex-1 overflow-y-auto pt-20 pb-20 px-margin">
<!-- Hero / Primary CTA -->
<div class="mb-8">
<p class="font-label text-secondary mb-2">Welcome back</p>
<button class="w-full bg-primary text-on-primary py-10 rounded-lg flex flex-col items-center justify-center gap-4 transition-transform active:scale-[0.98]">
<div class="w-16 h-16 border-2 border-dashed border-on-primary/30 rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-[32px]" data-icon="add_a_photo">add_a_photo</span>
</div>
<span class="font-title text-title">Scan Item</span>
</button>
</div>
<!-- Quick Stats / Bento Elements -->
<div class="grid grid-cols-2 gap-4 mb-8">
<div class="bg-surface-container p-4 rounded-lg flex flex-col gap-1">
<span class="font-label text-secondary">Active Repairs</span>
<span class="font-title text-title text-primary">03</span>
</div>
<div class="bg-surface-container p-4 rounded-lg flex flex-col gap-1">
<span class="font-label text-secondary">Completed</span>
<span class="font-title text-title text-primary">12</span>
</div>
</div>
<!-- Recent Repairs List -->
<div class="flex flex-col gap-4">
<div class="flex items-center justify-between">
<h2 class="font-title text-title">Recent Repairs</h2>
<button class="font-label text-secondary underline">View All</button>
</div>
<div class="flex flex-col border border-outline-variant rounded-lg divide-y divide-outline-variant bg-surface-container-lowest">
<!-- Repair Item 1 -->
<div class="p-4 flex items-center justify-between hover:bg-surface-container-low transition-colors">
<div class="flex items-center gap-4">
<div class="w-10 h-10 bg-surface-container border border-outline-variant rounded flex items-center justify-center">
<span class="material-symbols-outlined text-secondary" data-icon="checkroom">checkroom</span>
</div>
<div class="flex flex-col">
<span class="font-label text-primary">Denim Jacket</span>
<span class="font-label text-[12px] text-secondary">Seam repair • 2d ago</span>
</div>
</div>
<span class="material-symbols-outlined text-secondary" data-icon="chevron_right">chevron_right</span>
</div>
<!-- Repair Item 2 -->
<div class="p-4 flex items-center justify-between hover:bg-surface-container-low transition-colors">
<div class="flex items-center gap-4">
<div class="w-10 h-10 bg-surface-container border border-outline-variant rounded flex items-center justify-center">
<span class="material-symbols-outlined text-secondary" data-icon="chair">chair</span>
</div>
<div class="flex flex-col">
<span class="font-label text-primary">Oak Stool</span>
<span class="font-label text-[12px] text-secondary">Refinish • 5d ago</span>
</div>
</div>
<span class="material-symbols-outlined text-secondary" data-icon="chevron_right">chevron_right</span>
</div>
<!-- Repair Item 3 -->
<div class="p-4 flex items-center justify-between hover:bg-surface-container-low transition-colors">
<div class="flex items-center gap-4">
<div class="w-10 h-10 bg-surface-container border border-outline-variant rounded flex items-center justify-center">
<span class="material-symbols-outlined text-secondary" data-icon="watch">watch</span>
</div>
<div class="flex flex-col">
<span class="font-label text-primary">Analogue Watch</span>
<span class="font-label text-[12px] text-secondary">Battery swap • 1w ago</span>
</div>
</div>
<span class="material-symbols-outlined text-secondary" data-icon="chevron_right">chevron_right</span>
</div>
</div>
</div>
<!-- Featured Guide (Minimal Card) -->
<div class="mt-8 mb-4">
<div class="relative h-40 w-full rounded-lg bg-surface-container overflow-hidden group">
<img class="w-full h-full object-cover grayscale opacity-50" data-alt="A minimalist and high-contrast composition showing hands working with precision tools on a neutral workbench. The scene is lit with bright, diffused daylight, highlighting textures of wood and metal. The overall mood is clinical yet craft-focused, following a strict black and white lo-fi aesthetic with no decorative elements." src="https://lh3.googleusercontent.com/aida-public/AB6AXuD_Ubsaevc1s6dY-evYERAiKjbPBSYFVPiWbCVD3C5zwAmKm-qUCgtMElkFwdFmoThtB6sFY8ojetIXWaY2zMQxy0Fm9UZuaav8uqqztb4IsAHxrVIb3ANzzr0GP1g-oLfFImJ6n6y7N2m7EJBaV35uiRF5PehpWX1HFYyiQszZG-9xz_qgHuNCFH0H5lZlNC14x865AQP-VUhL5jFShT08mX6O3qPjoglhoCP5I-vxvKP-YEn9cG4GTFAIoVSkrwKoNWncotIBXTUX"/>
<div class="absolute inset-0 bg-gradient-to-t from-primary/80 to-transparent flex flex-col justify-end p-4">
<span class="text-on-primary font-label text-[12px] mb-1">LEARN</span>
<h3 class="text-on-primary font-title">Mastering the Blind Stitch</h3>
</div>
</div>
</div>
</section>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-[375px] z-50 bg-surface border-t border-outline-variant flex justify-around items-center h-16 px-margin">
<!-- Home (Active) -->
<button class="flex flex-col items-center justify-center text-primary font-bold hover:bg-surface-container-low active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="home" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="font-label text-[12px]">Home</span>
</button>
<!-- History -->
<button class="flex flex-col items-center justify-center text-secondary hover:bg-surface-container-low active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="font-label text-[12px]">History</span>
</button>
<!-- Profile -->
<button class="flex flex-col items-center justify-center text-secondary hover:bg-surface-container-low active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-label text-[12px]">Profile</span>
</button>
</nav>
</main>
<script>
        // Simple micro-interaction for list items
        document.querySelectorAll('.divide-y > div').forEach(item => {
            item.addEventListener('touchstart', () => {
                item.style.backgroundColor = 'var(--surface-container-low)';
            });
            item.addEventListener('touchend', () => {
                item.style.backgroundColor = '';
            });
        });
    </script>
</body></html>
