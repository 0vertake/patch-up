<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface-variant": "#4c4546",
                        "secondary-container": "#e1dfdf",
                        "error": "#ba1a1a",
                        "surface-container-highest": "#e2e2e2",
                        "on-secondary-fixed": "#1b1c1c",
                        "tertiary": "#000000",
                        "surface-container-low": "#f4f3f3",
                        "on-primary": "#ffffff",
                        "tertiary-fixed-dim": "#c6c6c6",
                        "surface-container-lowest": "#ffffff",
                        "on-background": "#1a1c1c",
                        "on-primary-fixed": "#1b1b1b",
                        "on-tertiary-fixed-variant": "#474747",
                        "outline-variant": "#cfc4c5",
                        "on-error": "#ffffff",
                        "surface-bright": "#f9f9f9",
                        "error-container": "#ffdad6",
                        "surface-variant": "#e2e2e2",
                        "background": "#f9f9f9",
                        "on-error-container": "#93000a",
                        "secondary-fixed-dim": "#c7c6c6",
                        "on-primary-fixed-variant": "#474747",
                        "surface-dim": "#dadada",
                        "on-primary-container": "#848484",
                        "inverse-primary": "#c6c6c6",
                        "tertiary-container": "#1b1b1b",
                        "primary": "#000000",
                        "on-secondary-fixed-variant": "#464747",
                        "surface-container-high": "#e8e8e8",
                        "surface-container": "#eeeeee",
                        "surface": "#f9f9f9",
                        "on-secondary-container": "#626262",
                        "tertiary-fixed": "#e2e2e2",
                        "secondary": "#5e5e5e",
                        "on-surface": "#1a1c1c",
                        "primary-container": "#1b1b1b",
                        "on-tertiary": "#ffffff",
                        "inverse-surface": "#2f3131",
                        "on-tertiary-fixed": "#1b1b1b",
                        "secondary-fixed": "#e4e2e2",
                        "outline": "#7e7576",
                        "inverse-on-surface": "#f1f1f1",
                        "primary-fixed-dim": "#c6c6c6",
                        "on-secondary": "#ffffff",
                        "surface-tint": "#5e5e5e",
                        "on-tertiary-container": "#848484",
                        "primary-fixed": "#e2e2e2"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "max_width": "375px",
                        "margin": "24px",
                        "gutter": "16px",
                        "columns": "4",
                        "unit": "8px"
                    },
                    "fontFamily": {
                        "label": ["Inter"],
                        "title": ["Inter"],
                        "body": ["Inter"]
                    },
                    "fontSize": {
                        "label": ["14px", {"lineHeight": "20px", "fontWeight": "500"}],
                        "title": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "body": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: #f9f9f9;
            color: #1a1c1c;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }
        .screen-canvas {
            width: 375px;
            height: 812px;
            background-color: #ffffff;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body text-body">
<div class="screen-canvas shadow-lg">
<!-- S-62 ID & Header -->
<header class="fixed top-0 w-full z-10 bg-surface border-b border-outline-variant flex items-center justify-between px-margin h-14">
<div class="flex items-center gap-2">
<span class="text-[10px] font-mono text-secondary self-start pt-1">ID S-62</span>
<span class="material-symbols-outlined text-primary cursor-pointer active:opacity-70" data-icon="arrow_back">arrow_back</span>
</div>
<h1 class="font-title text-title text-primary text-center flex-1">Request Help</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content Canvas -->
<main class="mt-14 px-margin pt-8 pb-32 flex-1 flex flex-col">
<!-- Stepper Indicator -->
<div class="mb-6">
<p class="font-label text-label text-secondary">Step 1 of 2</p>
<div class="mt-2 h-1 w-full bg-surface-container flex gap-1">
<div class="h-full w-1/2 bg-primary"></div>
<div class="h-full w-1/2 bg-surface-container-highest"></div>
</div>
</div>
<!-- Form Section -->
<div class="flex flex-col gap-6">
<!-- Message Textarea -->
<div class="flex flex-col gap-2">
<label class="font-label text-label text-on-surface" for="message">Message</label>
<div class="relative">
<textarea class="w-full bg-white border border-outline rounded-lg p-4 font-body text-body focus:outline-none focus:border-primary resize-none" id="message" name="message" placeholder="Describe the help you need..." rows="5"></textarea>
</div>
</div>
<!-- Preferred Time Input -->
<div class="flex flex-col gap-2">
<label class="font-label text-label text-on-surface" for="preferred-time">Preferred time</label>
<div class="relative">
<input class="w-full bg-white border border-outline rounded-lg p-4 font-body text-body focus:outline-none focus:border-primary" id="preferred-time" name="preferred-time" placeholder="Enter time (e.g. 14:00)" type="number"/>
</div>
</div>
<!-- Descriptive Placeholder Grid (Bento Style/Structural IA) -->
<div class="mt-4 grid grid-cols-2 gap-gutter">
<div class="aspect-square border border-outline-variant bg-surface-container-low rounded-lg flex flex-col items-center justify-center p-4 gap-2">
<span class="material-symbols-outlined text-secondary" data-icon="location_on">location_on</span>
<span class="font-label text-[12px] text-secondary text-center">Service Location</span>
</div>
<div class="aspect-square border border-outline-variant bg-surface-container-low rounded-lg flex flex-col items-center justify-center p-4 gap-2">
<span class="material-symbols-outlined text-secondary" data-icon="category">category</span>
<span class="font-label text-[12px] text-secondary text-center">Category Type</span>
</div>
</div>
</div>
</main>
<!-- Footer / Action Area -->
<footer class="fixed bottom-0 w-full bg-surface border-t border-outline-variant px-margin py-4 flex flex-col gap-4">
<!-- Disabled Primary Button -->
<button class="w-full h-12 bg-surface-container-highest text-secondary font-label rounded-lg flex items-center justify-center cursor-not-allowed border border-outline-variant" disabled="">
                Next
            </button>
</footer>
</div>
<script>
        // Simple micro-interaction for input focus effects
        document.querySelectorAll('input, textarea').forEach(el => {
            el.addEventListener('focus', () => {
                el.parentElement.classList.add('ring-1', 'ring-primary');
            });
            el.addEventListener('blur', () => {
                el.parentElement.classList.remove('ring-1', 'ring-primary');
            });
        });

        // Prevention of default scrolling behaviors if needed for fixed UI
        window.addEventListener('scroll', (e) => {
            if (window.innerWidth > 375) {
                // Keep the demo centered
            }
        });
    </script>
</body></html>
