<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface-variant": "#4c4546",
                        "secondary-container": "#e1dfdf",
                        "error": "#ba1a1a",
                        "surface-container-highest": "#e2e2e2",
                        "on-secondary-fixed": "#1b1c1c",
                        "tertiary": "#000000",
                        "surface-container-low": "#f4f3f3",
                        "on-primary": "#ffffff",
                        "tertiary-fixed-dim": "#c6c6c6",
                        "surface-container-lowest": "#ffffff",
                        "on-background": "#1a1c1c",
                        "on-primary-fixed": "#1b1b1b",
                        "on-tertiary-fixed-variant": "#474747",
                        "outline-variant": "#cfc4c5",
                        "on-error": "#ffffff",
                        "surface-bright": "#f9f9f9",
                        "error-container": "#ffdad6",
                        "surface-variant": "#e2e2e2",
                        "background": "#f9f9f9",
                        "on-error-container": "#93000a",
                        "secondary-fixed-dim": "#c7c6c6",
                        "on-primary-fixed-variant": "#474747",
                        "surface-dim": "#dadada",
                        "on-primary-container": "#848484",
                        "inverse-primary": "#c6c6c6",
                        "tertiary-container": "#1b1b1b",
                        "primary": "#000000",
                        "on-secondary-fixed-variant": "#464747",
                        "surface-container-high": "#e8e8e8",
                        "surface-container": "#eeeeee",
                        "surface": "#f9f9f9",
                        "on-secondary-container": "#626262",
                        "tertiary-fixed": "#e2e2e2",
                        "secondary": "#5e5e5e",
                        "on-surface": "#1a1c1c",
                        "primary-container": "#1b1b1b",
                        "on-tertiary": "#ffffff",
                        "inverse-surface": "#2f3131",
                        "on-tertiary-fixed": "#1b1b1b",
                        "secondary-fixed": "#e4e2e2",
                        "outline": "#7e7576",
                        "inverse-on-surface": "#f1f1f1",
                        "primary-fixed-dim": "#c6c6c6",
                        "on-secondary": "#ffffff",
                        "surface-tint": "#5e5e5e",
                        "on-tertiary-container": "#848484",
                        "primary-fixed": "#e2e2e2"
                    },
                    "borderRadius": {
                        "DEFAULT": "8px",
                        "lg": "8px",
                        "xl": "8px",
                        "full": "9999px"
                    },
                    "spacing": {
                        "max_width": "375px",
                        "margin": "24px",
                        "gutter": "16px",
                        "columns": "4",
                        "unit": "8px"
                    },
                    "fontFamily": {
                        "label": ["Inter"],
                        "title": ["Inter"],
                        "body": ["Inter"]
                    },
                    "fontSize": {
                        "label": ["14px", {"lineHeight": "20px", "fontWeight": "500"}],
                        "title": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "body": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: #f9f9f9;
            color: #1a1c1c;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
        }
        .canvas {
            width: 375px;
            height: 812px;
            background-color: #ffffff;
            position: relative;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            font-size: 24px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body>
<div class="canvas">
<!-- Screen ID Marker -->
<div class="absolute top-4 left-4 z-50">
<span class="font-label text-[10px] text-secondary tracking-widest opacity-50 uppercase">ID S-62</span>
</div>
<!-- TopAppBar -->
<header class="fixed top-0 w-[375px] bg-surface border-b border-outline-variant flex items-center justify-between px-margin h-14 z-40">
<button class="active:opacity-70 flex items-center justify-center">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="font-title text-title text-primary font-bold">PatchUp</h1>
<div class="w-6"></div> <!-- Spacer for center alignment -->
</header>
<!-- Main Content Canvas -->
<main class="flex-1 mt-14 px-margin pb-24">
<!-- Step Indicator -->
<div class="pt-8 pb-4">
<p class="font-label text-label text-secondary">Step 2 of 2: Summary</p>
<div class="h-1 w-full bg-surface-container-highest mt-2 rounded-full overflow-hidden">
<div class="h-full w-full bg-primary"></div>
</div>
</div>
<!-- Summary Section -->
<section class="mt-8 space-y-6">
<h2 class="font-title text-title text-primary">Review Request</h2>
<!-- Review List (Bento-style Minimalist Cards) -->
<div class="space-y-4">
<!-- Message Card -->
<div class="p-4 border border-outline-variant bg-surface-bright rounded-lg">
<div class="flex items-center justify-between mb-2">
<span class="font-label text-label text-secondary uppercase tracking-tight">Message</span>
<button class="active:opacity-70">
<span class="material-symbols-outlined text-[18px] text-secondary">edit</span>
</button>
</div>
<p class="font-body text-body text-primary">I noticed a small crack in the drywall near the main hallway entrance. It's about 4 inches long and seems to be expanding.</p>
</div>
<!-- Preferred Time Card -->
<div class="p-4 border border-outline-variant bg-surface-bright rounded-lg">
<div class="flex items-center justify-between mb-2">
<span class="font-label text-label text-secondary uppercase tracking-tight">Preferred Time</span>
<button class="active:opacity-70">
<span class="material-symbols-outlined text-[18px] text-secondary">edit</span>
</button>
</div>
<p class="font-body text-body text-primary">Wednesday, Oct 25 • 2:00 PM - 4:00 PM</p>
</div>
<!-- Location Placeholder (Asymmetric Logic) -->
<div class="grid grid-cols-2 gap-4">
<div class="p-4 border border-outline-variant bg-surface-bright rounded-lg flex flex-col justify-between aspect-square">
<span class="font-label text-label text-secondary uppercase tracking-tight">Status</span>
<span class="font-title text-title text-primary">Draft</span>
</div>
<div class="relative rounded-lg border border-outline-variant overflow-hidden aspect-square">
<div class="absolute inset-0 bg-surface-container flex items-center justify-center">
<span class="material-symbols-outlined text-outline text-4xl">map</span>
</div>
<div class="absolute bottom-2 left-2 bg-white/90 px-2 py-1 rounded text-[10px] font-bold uppercase">Area Map</div>
</div>
</div>
</div>
</section>
<!-- Secondary Actions -->
<div class="mt-12 flex flex-col gap-4">
<button class="w-full h-12 flex items-center justify-center border border-outline text-primary font-label text-label active:bg-surface-container-low transition-colors rounded-lg">
                    Back to Step 1
                </button>
<button class="w-full h-12 flex items-center justify-center text-secondary font-label text-label underline active:opacity-70">
                    Discard Request
                </button>
</div>
</main>
<!-- Bottom Primary Action (Floating-style Dock) -->
<footer class="fixed bottom-0 w-[375px] bg-white border-t border-outline-variant p-margin z-50">
<button class="w-full h-14 bg-primary text-on-primary font-label text-label font-bold rounded-lg shadow-sm active:scale-[0.98] transition-transform">
                Send Request
            </button>
</footer>
</div>
<script>
        // Micro-interaction for primary button
        document.querySelector('button.bg-primary').addEventListener('click', function() {
            const btn = this;
            const originalText = btn.innerText;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span>';
            btn.classList.add('opacity-80');
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span>';
                btn.style.backgroundColor = '#1a1c1c';
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.classList.remove('opacity-80');
                    btn.disabled = false;
                    btn.style.backgroundColor = '';
                }, 1500);
            }, 1000);
        });
    </script>
</body></html>
