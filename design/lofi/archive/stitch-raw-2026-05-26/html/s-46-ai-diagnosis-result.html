<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-surface-variant": "#4c4546",
                      "secondary-container": "#e1dfdf",
                      "error": "#ba1a1a",
                      "surface-container-highest": "#e2e2e2",
                      "on-secondary-fixed": "#1b1c1c",
                      "tertiary": "#000000",
                      "surface-container-low": "#f4f3f3",
                      "on-primary": "#ffffff",
                      "tertiary-fixed-dim": "#c6c6c6",
                      "surface-container-lowest": "#ffffff",
                      "on-background": "#1a1c1c",
                      "on-primary-fixed": "#1b1b1b",
                      "on-tertiary-fixed-variant": "#474747",
                      "outline-variant": "#cfc4c5",
                      "on-error": "#ffffff",
                      "surface-bright": "#f9f9f9",
                      "error-container": "#ffdad6",
                      "surface-variant": "#e2e2e2",
                      "background": "#f9f9f9",
                      "on-error-container": "#93000a",
                      "secondary-fixed-dim": "#c7c6c6",
                      "on-primary-fixed-variant": "#474747",
                      "surface-dim": "#dadada",
                      "on-primary-container": "#848484",
                      "inverse-primary": "#c6c6c6",
                      "tertiary-container": "#1b1b1b",
                      "primary": "#000000",
                      "on-secondary-fixed-variant": "#464747",
                      "surface-container-high": "#e8e8e8",
                      "surface-container": "#eeeeee",
                      "surface": "#f9f9f9",
                      "on-surface": "#1a1c1c",
                      "primary-container": "#1b1b1b",
                      "on-tertiary": "#ffffff",
                      "inverse-surface": "#2f3131",
                      "on-tertiary-fixed": "#1b1b1b",
                      "secondary-fixed": "#e4e2e2",
                      "outline": "#7e7576",
                      "inverse-on-surface": "#f1f1f1",
                      "primary-fixed-dim": "#c6c6c6",
                      "on-secondary": "#ffffff",
                      "surface-tint": "#5e5e5e",
                      "on-tertiary-container": "#848484",
                      "primary-fixed": "#e2e2e2"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "max_width": "375px",
                      "margin": "24px",
                      "gutter": "16px",
                      "columns": "4",
                      "unit": "8px"
              },
              "fontFamily": {
                      "label": ["Inter"],
                      "title": ["Inter"],
                      "body": ["Inter"]
              },
              "fontSize": {
                      "label": ["14px", {"lineHeight": "20px", "fontWeight": "500"}],
                      "title": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                      "body": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
              }
            },
          },
        }
    </script>
<style>
        body {
            background-color: #f9f9f9;
            color: #1a1c1c;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
        }
        .app-container {
            width: 375px;
            min-height: 812px;
            background-color: #ffffff;
            position: relative;
            padding-bottom: 80px; /* Space for fixed navigation */
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body>
<div class="app-container shadow-sm">
<!-- Top App Bar -->
<header class="fixed top-0 w-[375px] h-14 flex items-center justify-between px-6 bg-surface border-b border-outline-variant z-50">
<div class="flex items-center gap-4">
<button class="active:opacity-70">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="font-title text-title text-primary">AI Diagnosis</h1>
</div>
<div class="font-label text-label text-secondary opacity-50">ID S-46</div>
</header>
<!-- Main Content -->
<main class="pt-20 px-6 space-y-8">
<!-- Result Visualization Header -->
<section class="space-y-4">
<div class="w-full aspect-square bg-surface-container border border-outline-variant rounded-lg flex items-center justify-center relative overflow-hidden">
<div class="absolute inset-0 opacity-10 bg-[radial-gradient(#000_1px,transparent_1px)] [background-size:16px_16px]"></div>
<div class="relative z-10 flex flex-col items-center">
<span class="material-symbols-outlined text-[64px] text-secondary mb-2" style="font-variation-settings: 'wght' 200;">coffee_maker</span>
<div class="px-3 py-1 bg-primary text-on-primary rounded-full font-label text-[12px] uppercase tracking-wider">Analysis Complete</div>
</div>
</div>
</section>
<!-- Diagnosis Block -->
<section class="space-y-4">
<div class="bg-surface-container-low border border-outline-variant rounded-lg p-4 space-y-4">
<div class="flex justify-between items-center border-b border-outline-variant pb-3">
<span class="font-label text-secondary">Recognized</span>
<span class="font-body font-semibold text-primary">Coffee Machine</span>
</div>
<div class="flex justify-between items-center border-b border-outline-variant pb-3">
<span class="font-label text-secondary">Likely Issue</span>
<span class="font-body font-semibold text-primary">Heating element</span>
</div>
<div class="grid grid-cols-2 gap-4 border-b border-outline-variant pb-3">
<div class="space-y-1">
<span class="font-label text-secondary text-[12px] uppercase">Difficulty</span>
<div class="font-body text-primary font-medium">Medium</div>
</div>
<div class="space-y-1">
<span class="font-label text-secondary text-[12px] uppercase">Repairability</span>
<div class="font-body text-primary font-medium">High</div>
</div>
</div>
<div class="flex justify-between items-center">
<div class="flex items-center gap-2">
<span class="font-label text-secondary">Confidence</span>
<span class="material-symbols-outlined text-[18px] text-secondary">info</span>
</div>
<span class="font-title text-primary">92%</span>
</div>
</div>
<!-- Link Text -->
<div class="text-center">
<a class="font-label text-secondary underline active:opacity-50 transition-opacity" href="#">Why this result?</a>
</div>
</section>
<!-- Action Area -->
<section class="pt-4">
<button class="w-full h-12 bg-primary text-on-primary font-label text-label rounded-lg active:scale-[0.98] transition-transform flex items-center justify-center gap-2">
                    Next
                    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</section>
</main>
<!-- Bottom Navigation -->
<nav class="fixed bottom-0 w-[375px] h-16 flex justify-around items-center bg-surface border-t border-outline-variant z-50">
<button class="flex flex-col items-center justify-center text-secondary active:scale-95 transition-transform">
<span class="material-symbols-outlined">home</span>
<span class="font-label text-[10px]">Home</span>
</button>
<button class="flex flex-col items-center justify-center text-primary font-bold active:scale-95 transition-transform">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">history</span>
<span class="font-label text-[10px]">History</span>
</button>
<button class="flex flex-col items-center justify-center text-secondary active:scale-95 transition-transform">
<span class="material-symbols-outlined">person</span>
<span class="font-label text-[10px]">Profile</span>
</button>
</nav>
</div>
<script>
        // Micro-interaction for the confidence meter or buttons
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('mousedown', () => {
                button.style.transform = 'scale(0.97)';
            });
            button.addEventListener('mouseup', () => {
                button.style.transform = 'scale(1)';
            });
            button.addEventListener('mouseleave', () => {
                button.style.transform = 'scale(1)';
            });
        });
    </script>
</body></html>
