<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface-variant": "#4c4546",
                        "secondary-container": "#e1dfdf",
                        "error": "#ba1a1a",
                        "surface-container-highest": "#e2e2e2",
                        "on-secondary-fixed": "#1b1c1c",
                        "tertiary": "#000000",
                        "surface-container-low": "#f4f3f3",
                        "on-primary": "#ffffff",
                        "tertiary-fixed-dim": "#c6c6c6",
                        "surface-container-lowest": "#ffffff",
                        "on-background": "#1a1c1c",
                        "on-primary-fixed": "#1b1b1b",
                        "on-tertiary-fixed-variant": "#474747",
                        "outline-variant": "#cfc4c5",
                        "on-error": "#ffffff",
                        "surface-bright": "#f9f9f9",
                        "error-container": "#ffdad6",
                        "surface-variant": "#e2e2e2",
                        "background": "#f9f9f9",
                        "on-error-container": "#93000a",
                        "secondary-fixed-dim": "#c7c6c6",
                        "on-primary-fixed-variant": "#474747",
                        "surface-dim": "#dadada",
                        "on-primary-container": "#848484",
                        "inverse-primary": "#c6c6c6",
                        "tertiary-container": "#1b1b1b",
                        "primary": "#000000",
                        "on-secondary-fixed-variant": "#464747",
                        "surface-container-high": "#e8e8e8",
                        "surface-container": "#eeeeee",
                        "surface": "#f9f9f9",
                        "on-secondary-container": "#626262",
                        "tertiary-fixed": "#e2e2e2",
                        "secondary": "#5e5e5e",
                        "on-surface": "#1a1c1c",
                        "primary-container": "#1b1b1b",
                        "on-tertiary": "#ffffff",
                        "inverse-surface": "#2f3131",
                        "on-tertiary-fixed": "#1b1b1b",
                        "secondary-fixed": "#e4e2e2",
                        "outline": "#7e7576",
                        "inverse-on-surface": "#f1f1f1",
                        "primary-fixed-dim": "#c6c6c6",
                        "on-secondary": "#ffffff",
                        "surface-tint": "#5e5e5e",
                        "on-tertiary-container": "#848484",
                        "primary-fixed": "#e2e2e2"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "8px",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "max_width": "375px",
                        "margin": "24px",
                        "gutter": "16px",
                        "columns": "4",
                        "unit": "8px"
                    },
                    "fontFamily": {
                        "label": ["Inter"],
                        "title": ["Inter"],
                        "body": ["Inter"]
                    },
                    "fontSize": {
                        "label": ["14px", {"lineHeight": "20px", "fontWeight": "500"}],
                        "title": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "body": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
        body {
            background-color: #f9f9f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }
        .app-container {
            width: 375px;
            height: 812px;
            background: #ffffff;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            font-size: 24px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body>
<div class="app-container">
<!-- Header / TopAppBar -->
<header class="fixed top-0 w-full bg-surface border-b border-outline-variant flex items-center justify-between px-margin h-14 w-full z-50">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary active:opacity-70 cursor-pointer">arrow_back</span>
<span class="font-title text-title text-primary">PatchUp</span>
</div>
<div class="font-label text-label text-secondary">S-23</div>
</header>
<!-- Main Content -->
<main class="flex-1 mt-14 px-margin pt-8 pb-margin flex flex-col">
<!-- Screen ID and Step Indicator -->
<div class="mb-8">
<p class="font-label text-label text-secondary mb-1">Step 2 of 3</p>
<h1 class="font-title text-title text-primary">Create Password</h1>
</div>
<!-- Form Content -->
<div class="flex-1 flex flex-col gap-6">
<!-- Password Field -->
<div class="flex flex-col gap-2">
<label class="font-label text-label text-primary" for="password">Password</label>
<div class="relative">
<input class="w-full h-12 px-4 border border-outline rounded-lg font-body text-body bg-white focus:outline-none focus:border-primary transition-colors" id="password" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-secondary pointer-events-none">visibility_off</span>
</div>
</div>
<!-- Confirm Password Field -->
<div class="flex flex-col gap-2">
<label class="font-label text-label text-primary" for="confirm-password">Confirm password</label>
<div class="relative">
<input class="w-full h-12 px-4 border border-outline rounded-lg font-body text-body bg-white focus:outline-none focus:border-primary transition-colors" id="confirm-password" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-secondary pointer-events-none">visibility_off</span>
</div>
</div>
<!-- Password Requirements (Visual Anchor for Lo-Fi) -->
<div class="bg-surface-container-low p-4 rounded-lg flex flex-col gap-3 border border-outline-variant">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-label text-secondary" style="font-size: 16px;">check_circle</span>
<span class="font-label text-label text-secondary">At least 8 characters</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-label text-secondary" style="font-size: 16px;">check_circle</span>
<span class="font-label text-label text-secondary">One uppercase letter</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-label text-secondary" style="font-size: 16px;">check_circle</span>
<span class="font-label text-label text-secondary">One special character</span>
</div>
</div>
</div>
<!-- Footer Actions -->
<div class="mt-auto flex flex-col gap-4">
<!-- Primary Button (Disabled) -->
<button class="w-full h-12 bg-[#E0E0E0] text-[#9E9E9E] font-label text-label rounded-lg flex items-center justify-center cursor-not-allowed transition-colors" disabled="">
                    Next
                </button>
<!-- Secondary Button -->
<button class="w-full h-12 border border-outline text-primary font-label text-label rounded-lg flex items-center justify-center active:bg-surface-container-low transition-colors">
                    Back
                </button>
</div>
</main>
<!-- Placeholder for Interactive Logic -->
<script>
            // Micro-interaction: Mimic password visibility toggle (UI only)
            document.querySelectorAll('.material-symbols-outlined').forEach(icon => {
                if (icon.innerText === 'visibility_off' || icon.innerText === 'visibility') {
                    icon.style.cursor = 'pointer';
                    icon.style.pointerEvents = 'auto';
                    icon.addEventListener('click', function() {
                        const input = this.previousElementSibling;
                        if (input.type === 'password') {
                            input.type = 'text';
                            this.innerText = 'visibility';
                        } else {
                            input.type = 'password';
                            this.innerText = 'visibility_off';
                        }
                    });
                }
            });
        </script>
</div>
</body></html>
