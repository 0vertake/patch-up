<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        body {
            background-color: #f9f9f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }
        .app-container {
            width: 375px;
            height: 812px;
            background-color: #ffffff;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-on-background">
<div class="app-container">
<!-- TopAppBar -->
<header class="fixed top-0 w-full bg-surface dark:bg-surface border-b border-outline-variant flex items-center justify-between px-margin h-14 w-full z-50">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed" data-icon="arrow_back">arrow_back</span>
<span class="font-title text-[12px] text-secondary">S-23</span>
</div>
<h1 class="font-title text-title text-primary dark:text-primary-fixed">PatchUp</h1>
<div class="w-6"></div> <!-- Spacer for center alignment -->
</header>
<!-- Main Content Canvas -->
<main class="flex-1 mt-14 px-margin pt-unit flex flex-col gap-6">
<!-- Step Indicator -->
<section class="mt-4 flex flex-col gap-2">
<div class="flex justify-between items-end">
<span class="font-label text-label text-secondary">Step 1 of 3</span>
<span class="font-label text-[12px] text-on-surface-variant italic">All fields are required</span>
</div>
<!-- Progress Bar -->
<div class="w-full h-1 bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-primary w-1/3"></div>
</div>
</section>
<!-- Form Title -->
<section>
<h2 class="font-title text-title text-on-surface">Personal Details</h2>
</section>
<!-- Form Fields -->
<form class="flex flex-col gap-6">
<!-- Name Field -->
<div class="flex flex-col gap-2">
<label class="font-label text-label text-on-surface" for="name-input">Name</label>
<input class="w-full h-12 px-4 border border-outline rounded-DEFAULT bg-surface focus:outline-none focus:border-primary font-body text-body" id="name-input" placeholder="Enter your full name" type="text"/>
</div>
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="font-label text-label text-on-surface" for="email-input">Email</label>
<input class="w-full h-12 px-4 border border-outline rounded-DEFAULT bg-surface focus:outline-none focus:border-primary font-body text-body" id="email-input" placeholder="name@example.com" type="email"/>
</div>
<!-- Bento Placeholder for visual rhythm -->
<div class="grid grid-cols-2 gap-4 mt-4">
<div class="h-24 bg-surface-container border border-outline-variant flex items-center justify-center rounded-DEFAULT">
<span class="font-label text-[12px] text-secondary">Placeholder</span>
</div>
<div class="h-24 bg-surface-container border border-outline-variant flex items-center justify-center rounded-DEFAULT">
<span class="font-label text-[12px] text-secondary">Placeholder</span>
</div>
</div>
</form>
</main>
<!-- Fixed Action Bar (Sticky Bottom) -->
<footer class="px-margin py-6 bg-white flex flex-col gap-4">
<button class="w-full h-14 bg-[#E0E0E0] text-[#9E9E9E] rounded-DEFAULT font-label text-label cursor-not-allowed flex items-center justify-center gap-2" disabled="">
                Next
                <span class="material-symbols-outlined text-[18px]" data-icon="chevron_right">chevron_right</span>
</button>
</footer>
<!-- BottomNavBar (Suppressed for focused form journey as per UX mandate) -->
<!-- Suppression: This is a linear transactional journey, nav shell hidden to prioritize content canvas -->
</div>
<script>
        // Simple logic for input interaction (visual feedback only for lo-fi)
        const inputs = document.querySelectorAll('input');
        const nextButton = document.querySelector('button');

        inputs.forEach(input => {
            input.addEventListener('input', () => {
                const allFilled = Array.from(inputs).every(i => i.value.trim() !== '');
                if (allFilled) {
                    // This is just for demonstration, requirements asked for it to be DISABLED initially.
                    // nextButton.disabled = false;
                    // nextButton.classList.remove('bg-[#E0E0E0]', 'text-[#9E9E9E]');
                    // nextButton.classList.add('bg-black', 'text-white');
                }
            });
        });
    </script>
</body></html>
